<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="themeToggle" onclick="if(document.body.classList.contains('dark'))
        { document.body.classList.remove('dark'); this.textContent='🌙 Dark Mode'; }
         else { document.body.classList.add('dark'); this.textContent='☀️ Light Mode'; }">
         🌙 Dark Mode
        </button>

    <div class="container">
        <h2>Student Registration Form</h2>
        <form id="registrationForm">
            <input type="text" id="fullName" placeholder="Full Name">
            <span class="error" id="nameError"></span>

            <input type="email" id="email" placeholder="Email">
            <span class="error" id="emailError"></span>

            <input type="text" id="phone" placeholder="Phone Number">
            <span class="error" id="phoneError"></span>

            <select id="course">
                <option value="">Select Course</option>
                <option>Java Full Stack</option>
                <option>Python</option>
                <option>DevOps</option>
                <option>Data Science</option>
            </select>
            <span class="error" id="courseError"></span>

            <input type="password" id="password" placeholder="Password">
            <span class="error" id="passwordError"></span>

            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <span class="error" id="confirmError"></span>

            <div class="buttons">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>

        <p id="message"></p>
    </div>

    <script src="index.js"></script>
</body>
</html>
